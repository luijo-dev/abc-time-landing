<style>

        .main-canvas {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .watch-carousel-container {
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .watch-item {
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            position: absolute;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Hitbox adjustment: Hover effect triggers on item hover */
        .watch-carousel-container:has(.watch-item:hover) .watch-item:not(:hover) {
            filter: grayscale(1) opacity(0.3) blur(4px);
        }
        .watch-carousel-container:has(.watch-item:hover) ~ .bg-dynamic {
            filter: grayscale(1);
        }
        .tooltip-glass {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .watch-item.central-watch:hover .tooltip-glass {
            opacity: 1;
            transform: translateY(0);
        }

        /* Carousel State Classes */
        .left-far { transform: translateX(-450px) translateZ(-400px) scale(0.5); opacity: 0.2; z-index: 1; }
        .left-mid { transform: translateX(-250px) translateZ(-200px) scale(0.75); opacity: 0.4; z-index: 5; }
        .central-watch { transform: translateX(0) translateZ(0) scale(1); opacity: 1; z-index: 10; }
        .right-mid { transform: translateX(250px) translateZ(-200px) scale(0.75); opacity: 0.4; z-index: 5; }
        .right-far { transform: translateX(450px) translateZ(-400px) scale(0.5); opacity: 0.2; z-index: 1; }

<script>
    const container = document.querySelector('.watch-carousel-container');
    const watches = Array.from(document.querySelectorAll('.watch-item'));
    const bg = document.querySelector('.bg-dynamic');
    const infoLines = document.querySelectorAll('.absolute.right-16 p.font-headline');
    
    let activeIndex = 2;
    let isScrolling = false;

    const watchData = [
        { mov: "Calibre 240 HU", mat: "Acero Noble", res: "48 Horas", grad: "from-surface-container-lowest via-surface-dim to-[#1a2420]" },
        { mov: "Calibre 31-260", mat: "Platino 950", res: "38 Horas", grad: "from-surface-container-lowest via-surface-dim to-[#1a1c24]" },
        { mov: "Calibre 324 S C", mat: "Oro Rosa 18k", res: "45 Horas", grad: "from-surface-container-lowest via-surface-dim to-[#241a00]" },
        { mov: "CH 28-520 C", mat: "Oro Blanco", res: "55 Horas", grad: "from-surface-container-lowest via-surface-dim to-[#241a24]" },
        { mov: "Calibre R 27", mat: "Titanio", res: "40 Horas", grad: "from-surface-container-lowest via-surface-dim to-[#242424]" }
    ];

    const positions = ['left-far', 'left-mid', 'central-watch', 'right-mid', 'right-far'];

    function updateCarousel() {
        watches.forEach((watch, i) => {
            // Calculate relative position index
            let posIndex = (i - activeIndex + 2 + 5) % 5;
            watch.className = 'watch-item ' + positions[posIndex];
        });

        // Update background and info
        const data = watchData[activeIndex];
        bg.className = 'bg-dynamic fixed inset-0 -z-10 bg-gradient-to-br transition-all duration-1000 ' + data.grad;
        infoLines[0].textContent = data.mov;
        infoLines[1].textContent = data.mat;
        infoLines[2].textContent = data.res;
    }

    window.addEventListener('wheel', (e) => {
        if (isScrolling) return;
        
        if (e.deltaY > 0 && activeIndex < 4) {
            activeIndex++;
            isScrolling = true;
            updateCarousel();
        } else if (e.deltaY < 0 && activeIndex > 0) {
            activeIndex--;
            isScrolling = true;
            updateCarousel();
        }

        setTimeout(() => { isScrolling = false; }, 800);
    });

    // Click to focus
    watches.forEach((watch, i) => {
        watch.addEventListener('click', () => {
            activeIndex = i;
            updateCarousel();
        });
    });
</script>
